name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  id-token: write

env:
  NODE_VERSION: "25.9.0"

jobs:
  release:
    name: Create GitHub Release & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci
      - run: npm run build

      - name: Build MCPB package
        run: bash scripts/build-mcpb.sh

      - name: Create source archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # tar exits 1 for "file changed as we read it" (harmless); only fail on exit code 2+
          rc=0
          tar czf "proton-bridge-mcp-${VERSION}-source.tar.gz" \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=dist \
            --exclude=.mcpb-staging \
            --exclude='*.mcpb' \
            --exclude='*.tar.gz' \
            . || rc=$?
          if [ "$rc" -gt 1 ]; then exit "$rc"; fi

      - name: Extract changelog for this version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md > release-notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.txt
          files: |
            proton-bridge-mcp.mcpb
            proton-bridge-mcp-*-source.tar.gz

      - name: Publish to npm
        run: npm publish --access public --provenance
